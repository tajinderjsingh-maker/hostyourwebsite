<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Lottie Breakpoint Demo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
transition:background 0.4s ease;
}

/* Center animation */
#lottie{
width:260px;
height:260px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:30px;
}

h2{
font-size:32px;
color:#ffffff;
white-space:nowrap;
overflow:hidden;
border-right:3px solid white;
padding-right:10px;
animation:typing 3s steps(30,end), blink 0.8s infinite;
}

.breakpoint::after{
content:" Breakpoint above 1200px";
}

/* default */
body{background:#1abc9c}

@media (max-width:1200px){
body{background:#3498db}
.breakpoint::after{content:" Breakpoint is 1200px"}
}

@media (max-width:1000px){
body{background:#9b59b6}
.breakpoint::after{content:" Breakpoint is 1000px"}
}

@media (max-width:800px){
body{background:rgb(241, 195, 14);}
.breakpoint::after{content:" Breakpoint is 800px"}
}

@media (max-width:600px){
body{background:#e74c3c}
.breakpoint::after{content:" Breakpoint is 600px"}
}

@media (max-width:400px){
body{background:#2ecc71}
.breakpoint::after{content:" Breakpoint is 400px"}
}

@keyframes typing{
from{width:0}
to{width:100%}
}

@keyframes blink{
0%{border-color:transparent}
50%{border-color:white}
100%{border-color:transparent}
}
</style>
</head>

<body>

<div id="lottie"></div>

<h2>Responsive Layout - <span class="breakpoint"></span></h2>

<script>

document.addEventListener("DOMContentLoaded", function(){

lottie.loadAnimation({
  container: document.getElementById('lottie'),
  renderer: 'svg',
  loop: false,
  autoplay: true,
  path: 'Flip Number Counter Animation.json'
});

});

</script>

</body>
</html>
