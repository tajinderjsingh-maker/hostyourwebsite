<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter Experience</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#fff;overflow-x:hidden}

/* BG */
body::before{
content:"";position:fixed;inset:0;z-index:0;
background:
radial-gradient(circle at 20% 30%, rgba(239,68,68,0.25), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(59,130,246,0.25), transparent 40%);
animation:bgMove 25s linear infinite;
}
@keyframes bgMove{0%{transform:translate(0,0)}50%{transform:translate(-5%,5%)}100%{transform:translate(0,0)}}

.logoWrap{
position:fixed;top:20px;left:50%;transform:translateX(-50%);
display:flex;flex-direction:column;align-items:center;z-index:5;
}

.logo{
width:min(49vw,294px);
}

.tagline{
margin-top:6px;
font-size:12px;
opacity:0.7;
letter-spacing:0.5px;
}

/* STAGE */
.stage{
height:100vh;display:flex;align-items:center;justify-content:center;
perspective:1200px;position:relative;z-index:2;
}

/* CAROUSEL */
.carousel{
display:flex;align-items:center;justify-content:center;position:relative;
width:100%;height:400px;
}

.card{
position:absolute;width:252px;height:370px;border-radius:14px;
overflow:hidden;transition:all .5s cubic-bezier(.2,.8,.2,1);
border:1px solid rgba(255,255,255,0.25);
background:#000;
}

.card img,.card video{width:100%;height:100%;object-fit:cover}

.center{transform:translateX(0) scale(1);z-index:3;opacity:1}
.left{transform:translateX(-140px) scale(.88) rotateY(12deg);z-index:2;opacity:.6}
.right{transform:translateX(140px) scale(.88) rotateY(-12deg);z-index:2;opacity:.6}
.hiddenL{transform:translateX(-260px) scale(.8);opacity:0}
.hiddenR{transform:translateX(260px) scale(.8);opacity:0}

/* shadow overlap */
.card::after{
content:"";position:absolute;inset:0;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
pointer-events:none;
}

.hint{
position:absolute;bottom:40px;font-size:14px;opacity:.6;
}

/* VIDEO SECTION */
/* VIDEO SECTION */
.video-section{
position:relative;
width:100%;
padding:40px 20px;
display:flex;
gap:20px;
overflow-x:auto;
z-index:2;
margin-top:20px;
}
.video-card{
min-width:260px;background:#111;border-radius:12px;padding:10px;
}
.video-card iframe{width:100%;height:150px;border-radius:8px}
.video-title{text-align:center;font-size:12px;opacity:.7}

</style>
</head>
<body>

<div class="logoWrap">
  <img src="logo.png" class="logo">
  <div class="tagline">Celebrating 100 weeks</div>
</div>

<div class="stage">

<div class="carousel" id="carousel"></div>
<div class="hint">← Swipe →</div>

</div>

<div class="video-section">
<div class="video-card">
<iframe src="https://www.youtube.com/embed/KHx3EGSJoAs" allowfullscreen></iframe>
<div class="video-title">School of Complete Professionals</div>
</div>
<div class="video-card">
<iframe src="https://www.youtube.com/embed/jF9RMBgBD3M" allowfullscreen></iframe>
<div class="video-title">Aaj Ki Rani</div>
</div>
</div>

<script>
const TOTAL=89
const data=Array.from({length:TOTAL},(_,i)=>{
 if(i===86) return {type:'video',src:'video86.mp4'}
 if(i===88) return {type:'video',src:'video88.mp4'}
 return {type:'image',src:`images/slide${i}.webp`}
})

const carousel=document.getElementById('carousel')
let index=0

function createCard(item){
 const el=document.createElement('div')
 el.className='card'

 if(item.type==='video'){
  const v=document.createElement('video')
  v.src=item.src
  v.muted=true;v.loop=true;v.playsInline=true
  el.appendChild(v)
 }else{
  const img=document.createElement('img')
  img.src=item.src
  el.appendChild(img)
 }
 return el
}

let cards=[]

function render(){
 carousel.innerHTML=''
 cards=[]

 for(let i=index-2;i<=index+2;i++){
  if(!data[i]) continue
  const card=createCard(data[i])

  if(i===index) card.classList.add('center')
  else if(i===index-1) card.classList.add('left')
  else if(i===index+1) card.classList.add('right')
  else if(i<index) card.classList.add('hiddenL')
  else card.classList.add('hiddenR')

  carousel.appendChild(card)
  cards.push(card)
 }

 // autoplay center video
 const centerCard=cards.find(c=>c.classList.contains('center'))
 const vid=centerCard?.querySelector('video')
 if(vid) vid.play().catch(()=>{})
}

function next(){if(index<TOTAL-1){index++;render()}}
function prev(){if(index>0){index--;render()}}

// wheel horizontal feel
window.addEventListener('wheel',e=>{
 if(Math.abs(e.deltaY)>5){
  if(e.deltaY>0) next()
  else prev()
 }
})

// touch
let startX=0
window.addEventListener('touchstart',e=>startX=e.touches[0].clientX)
window.addEventListener('touchend',e=>{
 const dx=startX-e.changedTouches[0].clientX
 if(Math.abs(dx)<30) return
 if(dx>0) next()
 else prev()
})

render()
</script>

</body>
</html>
